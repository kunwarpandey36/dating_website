<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hey Shreyoshi 💕</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --pink: #f06292;
      --rose: #e91e63;
      --blush: #fce4ec;
      --lavender: #f3e5f5;
      --mint: #e8f5e9;
      --gold: #ffd54f;
      --green: #81c784;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      font-family: 'Lato', sans-serif;
      background: linear-gradient(135deg, #fce4ec 0%, #f3e5f5 40%, #e8f5e9 100%);
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Garden background ── */
    .garden {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* Floating petals */
    .petal {
      position: absolute;
      font-size: 1.6rem;
      animation: floatDown linear infinite;
      opacity: 0.75;
    }
    @keyframes floatDown {
      0%   { transform: translateY(-60px) rotate(0deg);   opacity: 0; }
      10%  { opacity: 0.8; }
      90%  { opacity: 0.8; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    /* Grass / garden row at bottom */
    .grass-row {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-around;
      align-items: flex-end;
      pointer-events: none;
      z-index: 1;
      padding: 0 10px;
    }
    .flower-plant {
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 2rem;
      animation: sway 3s ease-in-out infinite;
    }
    .flower-plant:nth-child(even) { animation-direction: alternate-reverse; }
    @keyframes sway {
      0%,100% { transform: rotate(-5deg); }
      50%      { transform: rotate(5deg);  }
    }
    .stem { width: 3px; height: 28px; background: var(--green); border-radius: 2px; }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 10;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(18px);
      border: 1.5px solid rgba(240,98,146,0.25);
      border-radius: 28px;
      padding: 52px 48px 44px;
      max-width: 480px;
      width: 90vw;
      text-align: center;
      box-shadow: 0 12px 48px rgba(233,30,99,0.14), 0 2px 8px rgba(0,0,0,0.06);
    }

    .heart-icon {
      font-size: 3.6rem;
      display: block;
      margin-bottom: 10px;
      animation: heartbeat 1.3s ease-in-out infinite;
    }
    @keyframes heartbeat {
      0%,100% { transform: scale(1); }
      14%      { transform: scale(1.18); }
      28%      { transform: scale(1); }
      42%      { transform: scale(1.12); }
      56%      { transform: scale(1); }
    }

    .site-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-style: italic;
      color: #c2185b;
      letter-spacing: 0.03em;
      margin-bottom: 20px;
      opacity: 0.85;
    }

    .question {
      font-family: 'Playfair Display', serif;
      font-size: 1.7rem;
      color: #880e4f;
      line-height: 1.4;
      margin-bottom: 38px;
    }
    .question span { color: var(--rose); }

    .btn-group {
      display: flex;
      gap: 40px;
      justify-content: center;
      align-items: center;
    }

    .btn-yes {
      background: linear-gradient(135deg, #e91e63, #f06292);
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 14px 36px;
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      box-shadow: 0 4px 18px rgba(233,30,99,0.35);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-yes:hover {
      transform: scale(1.07);
      box-shadow: 0 6px 24px rgba(233,30,99,0.5);
    }

    .btn-no {
      position: relative;
      background: rgba(255,255,255,0.88);
      border: 1.5px solid var(--pink);
      color: var(--rose);
      border-radius: 50px;
      padding: 13px 32px;
      font-family: 'Lato', sans-serif;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 2px 10px rgba(240,98,146,0.2);
      white-space: nowrap;
      z-index: 50;
    }
    .btn-no.flying {
      position: fixed;
      transition: left 0.08s, top 0.08s;
    }
    .btn-no:hover { transform: scale(1.04); }

    /* confetti burst on YES click */
    .confetti-piece {
      position: fixed;
      width: 10px; height: 10px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 999;
      animation: burst 1s ease-out forwards;
    }
    @keyframes burst {
      0%   { transform: translate(0,0) scale(1); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
    }

    /* overlay on YES */
    #yes-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #fce4ec, #f3e5f5, #e8f5e9);
      z-index: 200;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      padding: 30px;
    }
    #yes-overlay.show { display: flex; }
    #yes-overlay .big-heart { font-size: 6rem; animation: heartbeat 1.2s ease-in-out infinite; }
    #yes-overlay h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: #880e4f;
      margin: 18px 0 10px;
    }
    #yes-overlay p { color: #c2185b; font-size: 1.05rem; margin-bottom: 28px; }
    #yes-overlay a {
      background: linear-gradient(135deg, #e91e63, #f06292);
      color: #fff;
      border-radius: 50px;
      padding: 14px 38px;
      text-decoration: none;
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      box-shadow: 0 4px 18px rgba(233,30,99,0.4);
      transition: transform 0.2s;
    }
    #yes-overlay a:hover { transform: scale(1.06); }

    /* sparkles */
    .sparkle {
      position: fixed;
      font-size: 1.2rem;
      pointer-events: none;
      animation: sparkleFloat 2.5s ease-out forwards;
      z-index: 999;
    }
    @keyframes sparkleFloat {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-80px) scale(0.4); }
    }
  </style>
</head>
<body>

<!-- Garden background -->
<div class="garden" id="garden"></div>

<!-- Grass / flowers at bottom -->
<div class="grass-row" id="grassRow"></div>

<!-- Main card -->
<div class="card">
  <span class="heart-icon">💖</span>
  <div class="site-title">Hey Shreyoshi — this is the website that I made for you 🌸</div>
  <div class="question">
    Please give your <span>Instagram</span>, will you? 🌺
  </div>
  <div class="btn-group">
    <a class="btn-yes" id="btnYes" href="https://www.instagram.com/shreyoshi" target="_blank">Yes 💕</a>
    <button class="btn-no" id="btnNo" onclick="moveNo()">No 🙈</button>
  </div>
</div>

<!-- YES overlay -->
<div id="yes-overlay">
  <div class="big-heart">💖</div>
  <h2>Yay! Thank you Shreyoshi! 🌸</h2>
  <p>You made my day a thousand times better 🌷✨</p>
  <a href="https://www.instagram.com/shreyoshi" target="_blank">Open Instagram 💌</a>
</div>

<script>
  /* ── Petals ── */
  const petalEmojis = ['🌸','🌺','🌹','🌼','🌷','💐','🍀','🌿','✿','💮'];
  const garden = document.getElementById('garden');
  for (let i = 0; i < 28; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    p.textContent = petalEmojis[Math.floor(Math.random() * petalEmojis.length)];
    p.style.left = Math.random() * 100 + 'vw';
    p.style.top   = '-60px';
    p.style.animationDuration  = (6 + Math.random() * 8) + 's';
    p.style.animationDelay     = (Math.random() * 10) + 's';
    p.style.fontSize = (1.2 + Math.random() * 1.4) + 'rem';
    garden.appendChild(p);
  }

  /* ── Grass row ── */
  const grassRow = document.getElementById('grassRow');
  const flowerTypes = ['🌸','🌷','🌺','🌼','🌻','💐','🌹'];
  for (let i = 0; i < 18; i++) {
    const wrap = document.createElement('div');
    wrap.className = 'flower-plant';
    wrap.style.animationDelay = (Math.random() * 2) + 's';
    wrap.style.animationDuration = (2.5 + Math.random() * 2) + 's';
    wrap.innerHTML = `<span>${flowerTypes[Math.floor(Math.random()*flowerTypes.length)]}</span><div class="stem"></div>`;
    grassRow.appendChild(wrap);
  }

  /* ── No button logic ── */
  let noCount = 0;
  const messages = [
    'No 🙈','No 🙉','No 🙊',
    'Please 🥺','Please please 🥺🥺',
    'Please please Shreyoshi 🥺💕',
    'Shreyoshi please 🌸','Come on 🌺','Please 🌷',
    'Just once? 🌼','Pretty please 💖','Shreyoshi 🥺💫',
    'I promise 🌹','Pleeeease 🌸💕','Okay fine… please? 🌺',
    'Last time 🥺','Really please 💐','You sure? 🌷',
    'Shreyoshi… 🥺💖','(I give up 😢)'
  ];
  const colors = ['#e91e63','#f06292','#ab47bc','#26a69a','#ef5350','#42a5f5','#ff7043','#66bb6a','#ffa726','#ec407a'];

  function moveNo() {
    const btn = document.getElementById('btnNo');
    noCount++;

    /* Update label */
    if (noCount < messages.length) {
      btn.textContent = messages[noCount];
    }
    btn.style.background = colors[noCount % colors.length];
    btn.style.color = '#fff';
    btn.style.border = 'none';

    /* After 20 clicks, hide it */
    if (noCount >= 20) {
      btn.style.display = 'none';
      spawnSparkles(btn);
      return;
    }

    spawnSparkles(btn);

    /* On first click: grab current position, switch to fixed, then start jumping */
    if (!btn.classList.contains('flying')) {
      const rect = btn.getBoundingClientRect();
      btn.classList.add('flying');
      btn.style.left   = rect.left + 'px';
      btn.style.top    = rect.top  + 'px';
      btn.style.right  = 'auto';
      btn.style.bottom = 'auto';
      /* tiny delay so browser registers fixed first */
      setTimeout(() => jumpNo(), 30);
      return;
    }

    jumpNo();
  }

  function jumpNo() {
    const btn = document.getElementById('btnNo');
    const btnW = btn.offsetWidth  || 160;
    const btnH = btn.offsetHeight || 50;
    const margin = 16;
    const maxX = window.innerWidth  - btnW - margin;
    const maxY = window.innerHeight - btnH - margin;
    let x, y, attempts = 0;
    do {
      x = margin + Math.random() * (maxX - margin);
      y = margin + Math.random() * (maxY - margin);
      attempts++;
      const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
      const tooClose = Math.abs(x + btnW/2 - cx) < 180 && Math.abs(y + btnH/2 - cy) < 120;
      if (!tooClose || attempts > 30) break;
    } while(true);
    /* clamp just to be safe */
    x = Math.max(margin, Math.min(x, window.innerWidth  - btnW - margin));
    y = Math.max(margin, Math.min(y, window.innerHeight - btnH - margin));
    btn.style.left   = x + 'px';
    btn.style.top    = y + 'px';
    btn.style.right  = 'auto';
    btn.style.bottom = 'auto';
  }

  function spawnSparkles(el) {
    const rect = el.getBoundingClientRect ? el.getBoundingClientRect() : {left:200,top:200};
    const cx = rect.left + (rect.width||60)/2;
    const cy = rect.top  + (rect.height||40)/2;
    ['✨','💫','🌟','⭐','💥'].forEach(sym => {
      const s = document.createElement('div');
      s.className = 'sparkle';
      s.textContent = sym;
      s.style.left = (cx + (Math.random()-0.5)*80) + 'px';
      s.style.top  = (cy + (Math.random()-0.5)*40) + 'px';
      document.body.appendChild(s);
      setTimeout(() => s.remove(), 2600);
    });
  }

  /* ── YES button ── */
  document.getElementById('btnYes').addEventListener('click', function(e) {
    e.preventDefault();
    /* confetti burst */
    const colors2 = ['#e91e63','#f06292','#ab47bc','#ffd54f','#4caf50','#42a5f5','#ff7043'];
    for (let i = 0; i < 40; i++) {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      c.style.left = '50vw'; c.style.top = '50vh';
      c.style.background = colors2[Math.floor(Math.random()*colors2.length)];
      const angle = Math.random() * 2 * Math.PI;
      const dist  = 120 + Math.random() * 200;
      c.style.setProperty('--tx', Math.cos(angle)*dist + 'px');
      c.style.setProperty('--ty', Math.sin(angle)*dist + 'px');
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 1100);
    }
    setTimeout(() => {
      document.getElementById('yes-overlay').classList.add('show');
    }, 600);
    /* also open insta */
    setTimeout(() => { window.open('https://www.instagram.com/shreyoshi', '_blank'); }, 700);
  });
</script>
</body>
</html>
